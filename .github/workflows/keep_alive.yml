name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 2 * * *' # 매일 한국 시간 오전 11시 (UTC 02:00) 에 실행
  workflow_dispatch: # 필요시 수동 실행 가능

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to Prevent Pausing
        id: ping
        run: |
          status_code=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "status=$status_code" >> $GITHUB_OUTPUT
          
      - name: Notify via Telegram
        if: always()
        run: |
          if [ "${{ steps.ping.outputs.status }}" == "200" ]; then
            MESSAGE="✅ [GitHub Bot] Supabase DB가 성공적으로 깨어있음을 확인했습니다."
          else
            MESSAGE="❌ [GitHub Bot] DB 연결에 실패했습니다! (상태 코드: ${{ steps.ping.outputs.status }}). 대시보드 확인이 필요할 수 있습니다."
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" | jq .
